# Codeberg (Forgejo) Actions — build the site and deploy to Cloudflare Pages
# on every push to main. Lives in .forgejo/workflows/ so it runs on Codeberg
# only (GitHub ignores this path, so the mirror won't double-deploy).
#
# Requires two repository secrets (Settings → Actions → Secrets):
#   CLOUDFLARE_API_TOKEN   — token with: Account » Cloudflare Pages » Edit
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#
# One-time prerequisite (CI cannot create the project non-interactively):
#   npx wrangler pages project create cara-website --production-branch=main
name: deploy

on:
  push:
    branches: [main]

# Don't let two pushes deploy on top of each other.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: codeberg-tiny
    container:
      image: node:22-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Project name + output dir (dist) come from wrangler.jsonc.
      # --branch=main marks this as a production deployment.
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
